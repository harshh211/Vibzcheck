name: vibzcheck
description: "Vibzcheck - A collaborative music app where friends curate playlists together through real-time voting."
publish_to: 'none'
version: 1.0.0+1
 
environment:
  sdk: ^3.5.0
 
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
 
  # ---- Firebase ----
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
 
  # ---- State management ----
  provider: ^6.1.2
 
  # ---- Spotify integration (HTTP + .env for credentials) ----
  http: ^1.2.2
  flutter_dotenv: ^5.2.1
 
  # ---- UI helpers ----
  cached_network_image: ^3.4.1
  intl: ^0.19.0
 
  # ---- Utilities ----
  uuid: ^4.5.1
  googleapis_auth: ^1.6.0
  image_picker: ^1.1.2
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
 
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/service_account.json